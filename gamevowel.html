<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เกมแตะคำศัพท์ สระ เอ 🏃‍♂️✨</title>
    
    <!-- นำเข้าฟอนต์น่ารักๆ สำหรับเด็ก -->
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- นำเข้า TensorFlow.js และ Pose Detection (MediaPipe) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --text-dark: #2C3E50;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Mali', cursive;
            user-select: none;
        }

        body {
            background-color: var(--text-dark);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* หน้าจอ UI (DOM) สำหรับเริ่มและจบเกม */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 99%, #FECFEF 100%);
            z-index: 10;
            transition: opacity 0.5s;
        }

        .panel {
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem 3rem;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 90%;
            border: 5px solid var(--white);
        }

        h1 {
            color: var(--primary);
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 0px var(--accent);
        }

        p {
            font-size: 1.5rem;
            color: var(--text-dark);
            margin-bottom: 1.5rem;
        }

        .btn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #3b9b94;
            transition: all 0.2s;
            animation: pulse 2s infinite;
        }

        .btn:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 #3b9b94;
        }

        .btn:disabled {
            background: #ccc;
            box-shadow: 0 8px 0 #999;
            animation: none;
            cursor: not-allowed;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #video-element {
            display: none; /* ซ่อนวิดีโอ เพราะเราจะวาดลง Canvas แทน */
        }

        .hidden {
            display: none !important;
        }

        /* ปรับขนาดฟอนต์บนมือถือ */
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            p { font-size: 1.2rem; }
            .btn { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <!-- Video สำหรับรับภาพจากกล้อง -->
    <video id="video-element" autoplay playsinline></video>
    
    <!-- Canvas สำหรับวาดเกมทั้งหมด -->
    <canvas id="game-canvas"></canvas>

    <!-- UI หน้าเริ่มเกมและจบเกม -->
    <div id="ui-layer">
        <div id="start-panel" class="panel">
            <h1>🎮 เกมแตะคำศัพท์ "สระ เอ"</h1>
            <p>ให้นักเรียนขยับตัว ยกมือซ้าย-ขวา<br>แตะคำศัพท์ให้ตรงกับรูปภาพให้ไวที่สุด!</p>
            <p style="font-size: 1.2rem; color: #666;" id="loading-status">กำลังเตรียม AI และกล้อง... ⏳</p>
            <button id="start-btn" class="btn" disabled>เริ่มเกมเลย!</button>
        </div>

        <div id="end-panel" class="panel hidden">
            <h1>🏆 หมดเวลา!</h1>
            <p style="font-size: 2rem; color: #FF6B6B;">คะแนนรวม: <span id="final-score">0</span></p>
            <p>✅ แตะสำเร็จ: <span id="final-hits">0</span> ครั้ง</p>
            <p>⚡ เวลาเฉลี่ย: <span id="final-avg-time">0</span> วินาที/ข้อ</p>
            <button id="restart-btn" class="btn" style="margin-top: 1rem;">เล่นอีกครั้ง</button>
        </div>
    </div>

    <script>
        // --- การตั้งค่าตัวแปรหลักของเกม ---
        const video = document.getElementById('video-element');
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        
        const uiLayer = document.getElementById('ui-layer');
        const startPanel = document.getElementById('start-panel');
        const endPanel = document.getElementById('end-panel');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const statusText = document.getElementById('loading-status');

        let detector;
        let isGameRunning = false;
        let animationId;

        // ข้อมูลเกม
        let score = 0;
        let timeLeft = 60;
        let correctHits = 0;
        let totalReactionTime = 0;
        let questionStartTime = 0;
        
        let currentQuestion = null;
        let choices = []; // เก็บอ็อบเจ็กต์ของตัวเลือก (x, y, radius, text, isCorrect)
        let showFeedback = false; // แสดง ✅ ❌
        let feedbackType = ''; // 'correct' หรือ 'wrong'
        let feedbackTimer = 0;

        // รายการคำศัพท์ (10 คำ)
        const vocabulary = [
            { word: "ทะเล", emoji: "🌊", wrong: "เทเล" },
            { word: "เวลา", emoji: "⌚", wrong: "วาเล" },
            { word: "เฮฮา", emoji: "😂", wrong: "โฮฮา" },
            { word: "เกม", emoji: "🎮", wrong: "แกม" },
            { word: "โซเซ", emoji: "🚶‍♂️", wrong: "ซอเซ" },
            { word: "เกเร", emoji: "😈", wrong: "กาเร" },
            { word: "เสก", emoji: "🪄", wrong: "แสก" },
            { word: "เลข", emoji: "🔢", wrong: "แลข" },
            { word: "เมฆ", emoji: "☁️", wrong: "แมฆ" },
            { word: "เลน", emoji: "🛣️", wrong: "แลน" }
        ];

        let questionsQueue = []; // คิวคำถามสำหรับแต่ละรอบ

        // --- ระบบเสียง ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playTone(freq, type, duration) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        }

        function playCorrectSound() {
            playTone(600, 'sine', 0.1);
            setTimeout(() => playTone(800, 'sine', 0.2), 100);
            speakText("ถูกต้องเก่งมาก");
        }

        function playWrongSound() {
            playTone(300, 'sawtooth', 0.3);
        }

        function playGameOverSound() {
            playTone(400, 'sine', 0.2);
            setTimeout(() => playTone(500, 'sine', 0.2), 200);
            setTimeout(() => playTone(600, 'sine', 0.4), 400);
        }

        // ระบบอ่านออกเสียงภาษาไทย
        function speakText(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'th-TH';
                utterance.rate = 0.9; // พูดช้าลงนิดหน่อยให้เด็กฟังชัด
                window.speechSynthesis.speak(utterance);
            }
        }

        // --- ระบบกล้องและ AI ---
        async function setupCamera() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                throw new Error('Browser API navigator.mediaDevices.getUserMedia not available');
            }
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { width: 640, height: 480, facingMode: 'user' },
                audio: false
            });
            video.srcObject = stream;
            
            return new Promise((resolve) => {
                video.onloadedmetadata = () => resolve(video);
            });
        }

        async function initAI() {
            try {
                await tf.setBackend('webgl');
                const detectorConfig = { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING };
                detector = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet, detectorConfig);
                statusText.innerText = "ระบบพร้อมแล้ว!";
                statusText.style.color = "#4ECDC4";
                startBtn.disabled = false;
            } catch (error) {
                statusText.innerText = "เกิดข้อผิดพลาดในการโหลด AI";
                statusText.style.color = "red";
                console.error(error);
            }
        }

        // --- ระบบการจัดการหน้าจอ Canvas ---
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // คำนวณตำแหน่งใหม่เมื่อหน้าจอเปลี่ยนขนาด
            if (isGameRunning && currentQuestion) setupChoices();
        }
        window.addEventListener('resize', resizeCanvas);

        // --- ลอจิกเกมหลัก ---
        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            // รีเซ็ตค่า
            score = 0;
            timeLeft = 60;
            correctHits = 0;
            totalReactionTime = 0;
            isGameRunning = true;
            showFeedback = false;
            
            // สุ่มคำถาม
            questionsQueue = [...vocabulary].sort(() => 0.5 - Math.random());
            
            uiLayer.classList.add('hidden');
            startPanel.classList.add('hidden');
            endPanel.classList.add('hidden');

            resizeCanvas();
            nextQuestion();
            
            // เริ่มนับเวลาถอยหลัง
            const timerInterval = setInterval(() => {
                if (!isGameRunning) {
                    clearInterval(timerInterval);
                    return;
                }
                timeLeft--;
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            // เริ่มการวาด
            renderLoop();
            speakText("เริ่มเกมได้");
        }

        function nextQuestion() {
            if (questionsQueue.length === 0) {
                // ถ้าคำถามหมด ให้สุ่มชุดใหม่
                questionsQueue = [...vocabulary].sort(() => 0.5 - Math.random());
            }
            
            currentQuestion = questionsQueue.pop();
            questionStartTime = Date.now();
            setupChoices();
            
            // อ่านคำศัพท์ที่ถูกต้อง
            speakText(currentQuestion.word);
        }

        function setupChoices() {
            // สุ่มสลับซ้ายขวา
            const isLeftCorrect = Math.random() > 0.5;
            const yPos = canvas.height * 0.6; // ให้อยู่ต่ำลงมานิดนึงเพื่อให้เอื้อมถึงง่าย
            const radius = Math.min(canvas.width, canvas.height) * 0.15; // ขนาดฟองสบู่
            
            choices = [
                {
                    text: isLeftCorrect ? currentQuestion.word : currentQuestion.wrong,
                    isCorrect: isLeftCorrect,
                    x: canvas.width * 0.25, // ซ้าย
                    y: yPos,
                    radius: radius,
                    color: '#FF6B6B'
                },
                {
                    text: !isLeftCorrect ? currentQuestion.word : currentQuestion.wrong,
                    isCorrect: !isLeftCorrect,
                    x: canvas.width * 0.75, // ขวา
                    y: yPos,
                    radius: radius,
                    color: '#4ECDC4'
                }
            ];
        }

        function endGame() {
            isGameRunning = false;
            cancelAnimationFrame(animationId);
            playGameOverSound();
            
            uiLayer.classList.remove('hidden');
            endPanel.classList.remove('hidden');
            
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-hits').innerText = correctHits;
            
            let avg = correctHits > 0 ? (totalReactionTime / correctHits / 1000).toFixed(2) : 0;
            document.getElementById('final-avg-time').innerText = avg;
            
            speakText(`หมดเวลา คุณได้ ${score} คะแนน`);
        }

        // --- ระบบวาดและตรวจจับเฟรมต่อเฟรม ---
        async function renderLoop() {
            if (!isGameRunning) return;

            // 1. ตรวจจับท่าทาง
            let poses = [];
            try {
                poses = await detector.estimatePoses(video, { maxPoses: 1, flipHorizontal: false });
            } catch (e) {
                // ข้ามไปหากดึงไม่ได้
            }

            // 2. ล้างหน้าจอ
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 3. วาดภาพจากวิดีโอแบบเต็มจอ (และกลับด้านซ้ายขวาให้เหมือนกระจก)
            ctx.save();
            // หา scale ที่ครอบคลุม (object-fit: cover)
            const scale = Math.max(canvas.width / video.videoWidth, canvas.height / video.videoHeight);
            const scaledW = video.videoWidth * scale;
            const scaledH = video.videoHeight * scale;
            const offX = (canvas.width - scaledW) / 2;
            const offY = (canvas.height - scaledH) / 2;

            // กลับด้าน (Mirror)
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            
            // ปรับแสงวิดีโอให้มืดลงนิดหน่อยเพื่อให้ UI ชัดขึ้น
            ctx.filter = 'brightness(60%)';
            ctx.drawImage(video, offX, offY, scaledW, scaledH);
            ctx.restore();

            // 4. วาด UI (คะแนน, เวลา)
            drawHUD();

            if (showFeedback) {
                drawFeedback();
            } else if (currentQuestion) {
                // 5. วาดโจทย์และตัวเลือก
                drawQuestion();
                drawChoices();

                // 6. วาดมือและเช็คการชน
                if (poses.length > 0) {
                    processHands(poses[0], offX, offY, scale);
                }
            }

            animationId = requestAnimationFrame(renderLoop);
        }

        function drawHUD() {
            ctx.font = 'bold 30px "Mali"';
            ctx.fillStyle = 'white';
            ctx.textAlign = 'left';
            
            // พื้นหลังคะแนน
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.beginPath();
            ctx.roundRect(10, 10, 180, 50, 20);
            ctx.fill();
            
            ctx.fillStyle = '#FFE66D';
            ctx.fillText(`⭐ คะแนน: ${score}`, 25, 45);

            // เวลา
            ctx.textAlign = 'right';
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.beginPath();
            ctx.roundRect(canvas.width - 160, 10, 150, 50, 20);
            ctx.fill();

            ctx.fillStyle = timeLeft <= 10 ? '#FF6B6B' : '#4ECDC4';
            ctx.fillText(`⏳ ${timeLeft} วิ`, canvas.width - 30, 45);
        }

        function drawQuestion() {
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // วาด Emoji เป็นรูปภาพใหญ่
            ctx.font = `${Math.min(canvas.width, canvas.height) * 0.25}px Arial`;
            ctx.fillText(currentQuestion.emoji, canvas.width / 2, canvas.height * 0.25);
            
            // วาดคำใบ้ (ถ้าอยากให้มี)
            // ctx.font = 'bold 40px "Mali"';
            // ctx.fillStyle = 'white';
            // ctx.fillText("แตะคำศัพท์ให้ตรงกับภาพ!", canvas.width / 2, canvas.height * 0.1);
        }

        function drawChoices() {
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            choices.forEach(c => {
                // วาดฟองเงา
                ctx.beginPath();
                ctx.arc(c.x, c.y, c.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.shadowColor = c.color;
                ctx.shadowBlur = 20;
                ctx.fill();
                
                // ขอบ
                ctx.lineWidth = 8;
                ctx.strokeStyle = c.color;
                ctx.stroke();
                ctx.shadowBlur = 0; // ปิดเงาสำหรับข้อความ

                // ข้อความ
                ctx.fillStyle = '#2C3E50';
                const fontSize = c.radius * 0.5;
                ctx.font = `bold ${fontSize}px "Mali"`;
                ctx.fillText(c.text, c.x, c.y);
            });
        }

        function processHands(pose, offX, offY, scale) {
            const keypoints = pose.keypoints;
            // ดึงข้อมูลข้อมือซ้ายและขวา
            const leftWrist = keypoints.find(k => k.name === 'left_wrist');
            const rightWrist = keypoints.find(k => k.name === 'right_wrist');

            const confidenceThreshold = 0.3;

            if (leftWrist && leftWrist.score > confidenceThreshold) {
                checkHand(leftWrist, offX, offY, scale, '#FF9A9E'); // มือซ้ายสีชมพู
            }
            if (rightWrist && rightWrist.score > confidenceThreshold) {
                checkHand(rightWrist, offX, offY, scale, '#A1C4FD'); // มือขวาสีฟ้า
            }
        }

        function checkHand(keypoint, offX, offY, scale, color) {
            // แปลงพิกัดจากกล้อง (ดิบ) เป็นพิกัดหน้าจอ Canvas ที่ครอบ(cover)แล้ว
            // 1. หาตำแหน่งบนวิดีโอที่สเกลแล้ว
            let screenX = offX + (keypoint.x * scale);
            let screenY = offY + (keypoint.y * scale);

            // 2. สำคัญมาก! ต้องสลับ X เพราะ Canvas เราโดน ctx.scale(-1, 1) กลับด้านซ้ายขวาในตอนวาดวิดีโอ
            // ดังนั้นพิกัด x ที่เราเห็นบนหน้าจอจริงๆ จะกลับกัน
            screenX = canvas.width - screenX;

            // วาดตัวบ่งชี้มือ
            ctx.beginPath();
            ctx.arc(screenX, screenY, 40, 0, 2 * Math.PI);
            ctx.fillStyle = color;
            ctx.globalAlpha = 0.8;
            ctx.fill();
            ctx.lineWidth = 5;
            ctx.strokeStyle = 'white';
            ctx.stroke();
            ctx.globalAlpha = 1.0;

            // ตรวจสอบการชนกับตัวเลือก
            if (showFeedback) return; // ช่วงกำลังแสดงผล ไม่รับการชน

            choices.forEach(c => {
                const dist = Math.hypot(screenX - c.x, screenY - c.y);
                if (dist < c.radius + 40) { // รัศมีปุ่ม + รัศมีมือ
                    handleChoice(c.isCorrect);
                }
            });
        }

        function handleChoice(isCorrect) {
            showFeedback = true;
            feedbackTimer = Date.now();

            if (isCorrect) {
                feedbackType = 'correct';
                score += 10;
                correctHits++;
                totalReactionTime += (Date.now() - questionStartTime);
                playCorrectSound();
            } else {
                feedbackType = 'wrong';
                score = Math.max(0, score - 5);
                playWrongSound();
            }

            // หน่วงเวลาแสดงผล 1.5 วินาที แล้วไปข้อต่อไป
            setTimeout(() => {
                if (isGameRunning) {
                    showFeedback = false;
                    if (feedbackType === 'correct') {
                        nextQuestion();
                    } else {
                        // ถ้าผิด ให้ลองใหม่ข้อเดิม
                        questionStartTime = Date.now();
                    }
                }
            }, 1500);
        }

        function drawFeedback() {
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = 'bold 150px Arial';
            
            // ทำให้กระพริบหรือสั่นนิดๆ
            const elapsed = Date.now() - feedbackTimer;
            const scaleOffset = Math.sin(elapsed / 100) * 10;
            
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            
            if (feedbackType === 'correct') {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.beginPath();
                ctx.arc(0, 0, 150 + scaleOffset, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillText("✅", 0, 10); // +10 เพราะ baseline กลาง
                
                ctx.font = 'bold 60px "Mali"';
                ctx.fillStyle = '#4ECDC4';
                ctx.fillText("+10 เยี่ยมมาก!", 0, 220);
            } else {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.beginPath();
                ctx.arc(0, 0, 150 + scaleOffset, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillText("❌", 0, 10);
                
                ctx.font = 'bold 60px "Mali"';
                ctx.fillStyle = '#FF6B6B';
                ctx.fillText("-5 ลองใหม่นะ", 0, 220);
            }
            
            ctx.restore();
        }

        // --- การเริ่มต้น (Init) ---
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        window.onload = async () => {
            try {
                resizeCanvas();
                await setupCamera();
                video.play();
                await initAI();
            } catch (err) {
                console.error(err);
                statusText.innerText = "ไม่สามารถเข้าถึงกล้องได้ กรุณาอนุญาตให้ใช้งานกล้อง";
                statusText.style.color = "red";
            }
        };

    </script>
</body>
</html>
